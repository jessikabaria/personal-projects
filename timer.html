<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Minute Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #030920 0%, #091B6B 48%, #1840D8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    /* ---- Card ---- */
    .card {
      background: linear-gradient(160deg, rgba(25, 50, 165, 0.32) 0%, rgba(10, 22, 100, 0.52) 100%);
      border: 1.5px solid rgba(255, 255, 255, 0.16);
      border-radius: 32px;
      padding: 52px 52px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.5),
        0 4px 20px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.13);
      min-width: 420px;
    }

    /* ---- Ring ---- */
    .ring-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      flex-shrink: 0;
    }

    .ring-svg {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 6;
    }

    .ring-fill {
      fill: none;
      stroke: rgba(255, 255, 255, 0.82);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.95s linear, stroke 0.5s ease;
    }

    .ring-wrap.running .ring-fill {
      animation: ring-pulse 2s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { stroke: rgba(255,255,255,0.82); }
      50%       { stroke: rgba(255,255,255,1); }
    }

    /* ---- Content inside ring ---- */
    .ring-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 240px;
    }

    .time {
      font-size: 74px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      margin-bottom: 10px;
      transition: color 0.5s ease;
    }

    .time.done {
      color: #FF6B6B;
      animation: blink 1.1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .countdown-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.4s ease, letter-spacing 0.4s ease;
    }

    .countdown-label.done {
      color: rgba(255, 107, 107, 0.75);
      letter-spacing: 2.5px;
    }

    /* ---- Buttons ---- */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-start {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 44px;
      border-radius: 100px;
      border: none;
      background: #ffffff;
      color: #0A1860;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,255,255,0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    .btn-start:hover {
      background: rgba(255,255,255,0.93);
      box-shadow: 0 8px 32px rgba(255,255,255,0.32);
      transform: translateY(-2px);
    }

    .btn-start:active { transform: translateY(0); }

    .btn-start svg { flex-shrink: 0; }

    .btn-reset {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
      flex-shrink: 0;
    }

    .btn-reset:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .btn-reset:active { transform: translateY(0); }

    /* Reset icon spin on click */
    .btn-reset.spin svg {
      animation: spin-once 0.45s ease-out;
    }

    @keyframes spin-once {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    /* ---- Okta wordmark ---- */
    .branding {
      position: fixed;
      bottom: 28px;
      right: 36px;
      color: rgba(255,255,255,0.28);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1.5px;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Ring with time inside -->
    <div class="ring-wrap" id="ringWrap">
      <svg class="ring-svg" width="300" height="300" viewBox="0 0 300 300">
        <circle class="ring-track" cx="150" cy="150" r="130"/>
        <circle class="ring-fill"  cx="150" cy="150" r="130" id="ringFill"/>
      </svg>

      <div class="ring-content">
        <div class="time" id="timeDisplay">05:00</div>
        <div class="countdown-label" id="countdownLabel">Countdown</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-start" id="startBtn" onclick="toggleTimer()">
        <!-- Play icon -->
        <svg id="btnIcon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <polygon points="3,1 15,8 3,15"/>
        </svg>
        <span id="btnText">Start Timer</span>
      </button>

      <button class="btn-reset" id="resetBtn" onclick="resetTimer()">
        <!-- Circular arrow (reset) -->
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="branding">okta</div>

  <script>
    const TOTAL = 5 * 60;
    let remaining  = TOTAL;
    let running    = false;
    let ticker     = null;
    let audioCtx   = null;
    let alarmFired = false;

    const timeEl    = document.getElementById('timeDisplay');
    const labelEl   = document.getElementById('countdownLabel');
    const startBtn  = document.getElementById('startBtn');
    const btnIcon   = document.getElementById('btnIcon');
    const btnText   = document.getElementById('btnText');
    const ringWrap  = document.getElementById('ringWrap');
    const resetBtn  = document.getElementById('resetBtn');
    const ring      = document.getElementById('ringFill');

    const R      = 130;
    const CIRCUM = 2 * Math.PI * R;
    ring.style.strokeDasharray  = CIRCUM;
    ring.style.strokeDashoffset = 0;

    function pad(n) { return String(n).padStart(2, '0'); }

    // ---- Audio ----
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playAlarm() {
      const ctx = getCtx();
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t0 = ctx.currentTime + i * 0.38;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(0.45, t0 + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.1);
        osc.start(t0);
        osc.stop(t0 + 1.15);
      });
    }

    document.addEventListener('click', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    // ---- Button icon helpers ----
    const PLAY_PATH  = '<polygon points="3,1 15,8 3,15"/>';
    const PAUSE_PATH = '<rect x="2" y="1" width="5" height="14" rx="1.5"/><rect x="9" y="1" width="5" height="14" rx="1.5"/>';

    function setStartBtn(state) {
      // state: 'start' | 'pause' | 'resume' | 'restart'
      const labels = { start: 'Start Timer', pause: 'Pause Timer', resume: 'Resume', restart: 'Restart' };
      btnText.textContent = labels[state];
      btnIcon.innerHTML = (state === 'pause') ? PAUSE_PATH : PLAY_PATH;
    }

    // ---- Render ----
    function render() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      timeEl.textContent = `${pad(m)}:${pad(s)}`;
      ring.style.strokeDashoffset = CIRCUM * (1 - remaining / TOTAL);

      if (remaining <= 0 && !alarmFired) {
        alarmFired = true;
        timeEl.classList.add('done');
        labelEl.textContent = 'Complete!';
        labelEl.classList.add('done');
        ring.style.stroke = '#FF6B6B';
        setStartBtn('restart');
        ringWrap.classList.remove('running');
        playAlarm();
      }
    }

    // ---- Controls ----
    function toggleTimer() {
      if (remaining <= 0) { resetTimer(); return; }

      if (running) {
        clearInterval(ticker);
        running = false;
        setStartBtn('resume');
        labelEl.textContent = 'Paused';
        ringWrap.classList.remove('running');
      } else {
        running = true;
        setStartBtn('pause');
        labelEl.textContent = 'Countdown';
        ringWrap.classList.add('running');
        ticker = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          render();
          if (remaining <= 0) { clearInterval(ticker); running = false; }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(ticker);
      running    = false;
      remaining  = TOTAL;
      alarmFired = false;

      timeEl.classList.remove('done');
      labelEl.textContent = 'Countdown';
      labelEl.classList.remove('done');
      setStartBtn('start');
      ringWrap.classList.remove('running');

      ring.style.transition       = 'none';
      ring.style.stroke           = '';
      ring.style.strokeDashoffset = 0;
      requestAnimationFrame(() => {
        ring.style.transition = 'stroke-dashoffset 0.95s linear, stroke 0.5s ease';
      });

      // Spin the reset icon
      resetBtn.classList.add('spin');
      resetBtn.addEventListener('animationend', () => resetBtn.classList.remove('spin'), { once: true });

      render();
    }

    render();
  </script>

</body>
</html>
